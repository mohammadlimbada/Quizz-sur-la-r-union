<!DOCTYPE html> <!-- Déclaration du type de document HTML5 -->
<html lang="fr"> <!-- Langue française définie pour l'accessibilité et le SEO -->
<head> <!-- Section d'en-tête : métadonnées invisibles pour l'utilisateur -->
  <meta charset="UTF-8" /> <!-- Encodage UTF-8 pour les accents et emojis -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Adapte l'affichage aux écrans mobiles -->
  <title>Admin — Quiz Réunion</title> <!-- Titre affiché dans l'onglet du navigateur -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>" /> <!-- Favicon emoji clé à molette (SVG inline, pas de fichier séparé) -->
  <link rel="stylesheet" href="/css/style.css" /> <!-- Feuille de style principale (thème volcanique partagé avec le quiz) -->
  <style>
    /* ════════════════════════════════════════════════════════
       Styles spécifiques au panneau d'administration
       (complètent /css/style.css sans le modifier)
       ════════════════════════════════════════════════════════ */

    /* ── Conteneur principal ── */
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 30px 24px 80px; } /* Largeur max centrée avec espacement intérieur */
    .admin-header { /* Barre d'en-tête du dashboard : logo à gauche, boutons à droite */
      display: flex; align-items: center; justify-content: space-between; /* Flexbox horizontal avec éléments aux extrémités */
      margin-bottom: 32px; padding-bottom: 20px; /* Espace sous l'en-tête */
      border-bottom: 1px solid var(--border); /* Séparateur horizontal discret */
    }
    .admin-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; } /* Titre principal du dashboard en police Syne */
    .admin-badge { /* Badge rouge "MODE ADMIN" affiché à côté du titre */
      background: rgba(255,69,0,.15); border: 1px solid rgba(255,69,0,.4); /* Fond et bordure couleur lave semi-transparents */
      color: var(--lava); border-radius: 99px; padding: 5px 14px; font-size: .8rem; font-weight: 600; /* Pilule arrondie couleur lave */
    }
    .btn-logout { /* Bouton de déconnexion dans l'en-tête */
      background: transparent; border: 1px solid var(--border-hi); color: var(--text-muted); /* Aspect discret par défaut */
      border-radius: var(--r); padding: 7px 16px; font-size: .84rem; cursor: pointer; /* Coins arrondis et curseur pointeur */
      transition: border-color var(--t) var(--ease), color var(--t) var(--ease); /* Transition fluide au survol */
    }
    .btn-logout:hover { border-color: var(--lava); color: var(--lava); } /* Survol : bordure et texte couleur lave */

    /* ── Panneau de connexion ── */
    #panel-login { /* Conteneur centré de la page de login */
      display: flex; flex-direction: column; align-items: center; justify-content: center; /* Centrage vertical et horizontal */
      min-height: 60vh; gap: 0; /* Occupe 60% de la hauteur de la fenêtre */
    }
    .login-box { /* Carte de connexion avec effet glassmorphism */
      background: var(--bg-700); border: 1px solid var(--border-hi); /* Fond sombre avec bordure visible */
      border-radius: var(--r-xl); padding: 40px 36px; width: 100%; max-width: 380px; /* Grands coins arrondis, largeur max 380px */
      text-align: center; /* Contenu centré */
      box-shadow: 0 24px 64px rgba(0,0,0,.5); /* Ombre portée profonde pour l'effet de profondeur */
    }
    .login-icon { font-size: 2.4rem; margin-bottom: 12px; } /* Grand emoji en haut de la carte de login */
    .login-title { font-family: 'Syne',sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; } /* Titre de la carte en police Syne */
    .login-sub { color: var(--text-muted); font-size: .88rem; margin-bottom: 24px; } /* Sous-titre atténué sous le titre */
    .login-input { /* Champ de saisie du mot de passe admin */
      width: 100%; background: var(--bg-900); border: 1.5px solid var(--border-hi); /* Pleine largeur, fond très sombre */
      border-radius: var(--r); color: var(--text); padding: 12px 16px; /* Coins arrondis, texte blanc chaud */
      font-size: 1rem; outline: none; margin-bottom: 12px; /* Pas de contour natif du navigateur */
      transition: border-color var(--t) var(--ease); /* Transition fluide du focus */
    }
    .login-input:focus { border-color: var(--lava); } /* Bordure lave quand le champ est actif */
    .login-error { color: var(--lava); font-size: .84rem; min-height: 20px; margin-bottom: 10px; } /* Message d'erreur de connexion en rouge lave */

    /* ── Onglets de navigation ── */
    .tabs { display: flex; gap: 8px; margin-bottom: 28px; } /* Rangée de boutons d'onglets avec espacement */
    .tab-btn { /* Bouton d'onglet inactif */
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); /* Fond translucide avec bordure */
      color: var(--text-muted); padding: 9px 22px; font-size: .9rem; font-weight: 600; /* Texte atténué semi-gras */
      cursor: pointer; transition: all var(--t) var(--ease); /* Transition fluide sur toutes les propriétés */
    }
    .tab-btn.active { background: var(--lava); border-color: var(--lava); color: #fff; } /* Onglet actif : fond rouge lave, texte blanc */
    .tab-btn:not(.active):hover { border-color: var(--border-hi); color: var(--text); } /* Survol des onglets inactifs : bordure plus visible */

    /* ── Tableau admin ── */
    .admin-table-wrap { /* Conteneur avec bordures arrondies pour les tableaux */
      background: var(--bg-700); border: 1px solid var(--border); /* Fond sombre avec bordure */
      border-radius: var(--r-lg); overflow: hidden; /* Coins arrondis + masquage du débordement des cellules */
    }
    .admin-table { width: 100%; border-collapse: collapse; font-size: .88rem; } /* Tableau pleine largeur sans double bordures */
    .admin-table th { /* Cellule d'en-tête du tableau */
      background: var(--bg-600); padding: 13px 16px; text-align: left; /* Fond légèrement plus clair, alignement gauche */
      color: var(--text-muted); font-weight: 600; font-size: .78rem; /* Texte atténué, petite taille */
      text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); /* Majuscules espacées + séparateur bas */
    }
    .admin-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; } /* Cellule de donnée avec séparateur horizontal */
    .admin-table tr:last-child td { border-bottom: none; } /* Supprime le séparateur de la dernière ligne (évite le double bord) */
    .admin-table tr:hover td { background: var(--surface); } /* Surlignage discret de la ligne au survol */
    .admin-table .mono { font-family: 'JetBrains Mono', monospace; font-size: .85rem; } /* Classe utilitaire pour les valeurs en police monospace (IDs, scores) */
    .empty-row td { text-align: center; color: var(--text-muted); padding: 40px; } /* Ligne vide centrée (affiché pendant le chargement ou si aucune donnée) */

    /* ── Boutons d'action ── */
    .btn-del { /* Bouton rouge "Supprimer" */
      background: transparent; border: 1px solid rgba(255,69,0,.4); color: var(--lava); /* Fond transparent, bordure et texte couleur lave */
      border-radius: 8px; padding: 5px 12px; font-size: .78rem; cursor: pointer; /* Compact et cliquable */
      transition: background var(--t) var(--ease); /* Transition du fond au survol */
    }
    .btn-del:hover { background: rgba(255,69,0,.18); } /* Survol : fond rouge lave semi-transparent */
    .btn-edit { /* Bouton bleu "Modifier" */
      background: transparent; border: 1px solid rgba(0,201,224,.4); color: var(--ocean); /* Bordure et texte couleur océan */
      border-radius: 8px; padding: 5px 12px; font-size: .78rem; cursor: pointer; /* Compact et cliquable */
      transition: background var(--t) var(--ease); margin-right: 6px; /* Espace entre modifier et supprimer */
    }
    .btn-edit:hover { background: rgba(0,201,224,.12); } /* Survol : fond bleu océan très subtil */

    /* ── Modal de modification d'un score ── */
    .edit-overlay { /* Overlay plein écran semi-transparent */
      position: fixed; inset: 0; background: rgba(13,13,20,.85); backdrop-filter: blur(6px); /* Fixé à la fenêtre, fond sombre + flou */
      display: flex; align-items: center; justify-content: center; z-index: 1000; /* Centrage du contenu, au-dessus de tout */
      opacity: 0; pointer-events: none; transition: opacity .25s var(--ease); /* Invisible et non-interactif par défaut */
    }
    .edit-overlay.show { opacity: 1; pointer-events: auto; } /* Classe ajoutée par JS pour afficher le modal */
    .edit-box { /* Boîte de formulaire du modal */
      background: var(--bg-700); border: 1px solid var(--border-hi); border-radius: var(--r-xl); /* Fond sombre, bordure visible, grands coins */
      padding: 32px 28px; max-width: 400px; width: calc(100% - 40px); /* Espacement intérieur, largeur max responsive */
      transform: translateY(12px); transition: transform .3s var(--ease); /* Décalage initial pour l'animation d'ouverture */
    }
    .edit-overlay.show .edit-box { transform: translateY(0); } /* La boîte remonte à sa position finale lors de l'ouverture */
    .edit-title { font-family: 'Syne',sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; } /* Titre du modal en police Syne */
    .edit-row { margin-bottom: 14px; } /* Espace entre chaque groupe label + input */
    .edit-label { display: block; font-size: .8rem; color: var(--text-muted); margin-bottom: 5px; } /* Label au-dessus du champ, texte atténué */
    .edit-input { /* Champ de saisie dans le modal */
      width: 100%; background: var(--bg-900); border: 1.5px solid var(--border-hi); /* Pleine largeur, fond très sombre */
      border-radius: var(--r); color: var(--text); padding: 9px 13px; font-size: .9rem; outline: none; /* Coins arrondis, pas de contour natif */
      transition: border-color var(--t) var(--ease); /* Transition fluide du focus */
    }
    .edit-input:focus { border-color: var(--ocean); } /* Bordure bleue océan quand le champ est actif */
    .edit-actions { display: flex; gap: 10px; margin-top: 20px; } /* Rangée de boutons en bas du modal */
    .btn-cancel { /* Bouton "Annuler" du modal */
      flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); /* Prend la moitié de la largeur, aspect discret */
      border-radius: var(--r); padding: 10px; cursor: pointer; font-size: .9rem; /* Coins arrondis, taille normale */
      transition: background var(--t) var(--ease); /* Transition du fond au survol */
    }
    .btn-cancel:hover { background: var(--surface-hi); } /* Survol : fond légèrement plus visible */
    .edit-error { color: var(--lava); font-size: .82rem; margin-top: 8px; min-height: 18px; } /* Message d'erreur de validation du formulaire */

    /* ── Cartes statistiques ── */
    .admin-stats { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; } /* Rangée de cartes avec retour à la ligne si nécessaire */
    .admin-stat { /* Carte statistique individuelle (ex: nombre de joueurs) */
      background: var(--bg-700); border: 1px solid var(--border); border-radius: var(--r); /* Fond sombre avec bordure et coins arrondis */
      padding: 14px 20px; flex: 1; min-width: 120px; /* S'étire uniformément, largeur minimum 120px */
    }
    .admin-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 600; color: var(--amber); } /* Grande valeur numérique en ambre (couleur premium) */
    .admin-stat-label { font-size: .75rem; color: var(--text-muted); margin-top: 2px; } /* Label atténué sous la valeur */

    /* ── En-tête de section ── */
    .section-head { /* Rangée titre + bouton actualiser */
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; /* Flexbox avec éléments aux extrémités */
    }
    .section-title { font-weight: 700; font-size: 1rem; } /* Titre de section en gras */
    .btn-refresh { /* Bouton "↻ Actualiser" */
      background: transparent; border: 1px solid var(--border); color: var(--text-muted); /* Aspect discret */
      border-radius: var(--r); padding: 6px 13px; font-size: .78rem; cursor: pointer; /* Compact et cliquable */
      transition: border-color var(--t) var(--ease), color var(--t) var(--ease); /* Transition fluide au survol */
    }
    .btn-refresh:hover { border-color: var(--border-hi); color: var(--text); } /* Survol : bordure et texte plus visibles */
  </style>
</head>
<body> <!-- Corps de la page admin : contient le panneau login et le tableau de bord -->

<!-- ╔════════════════════════════════════════════════════════╗
     ║  PANNEAU LOGIN — affiché avant l'authentification    ║
     ╚════════════════════════════════════════════════════════╝ -->
<div class="admin-wrap" id="panel-login"> <!-- Conteneur centré de la page de connexion admin -->
  <div class="login-box"> <!-- Carte de connexion avec fond verre dépoli -->
    <div class="login-icon">🔧</div> <!-- Icône emoji clé à molette symbolisant l'administration -->
    <h2 class="login-title">Panneau Admin</h2> <!-- Titre principal de la page de connexion -->
    <p class="login-sub">Quiz Réunion · Accès restreint</p> <!-- Sous-titre indiquant que l'accès est protégé -->

    <!-- Champ de saisie du mot de passe admin (type password masque les caractères) -->
    <input
      type="password"
      id="admin-pwd"
      class="login-input"
      placeholder="Mot de passe admin"
      autocomplete="current-password"
    />

    <div id="login-error" class="login-error"></div> <!-- Zone d'affichage des erreurs de connexion (remplie par admin.js) -->
    <button class="btn btn-primary" style="width:100%;" id="btn-admin-login">Se connecter →</button> <!-- Bouton de connexion pleine largeur -->
    <p style="margin-top:18px;font-size:.8rem;color:var(--text-dim);">
      <a href="/" style="color:var(--text-muted);text-decoration:none;">← Retour au quiz</a> <!-- Lien vers la page principale du quiz -->
    </p>
  </div>
</div> <!-- fin #panel-login -->

<!-- ╔════════════════════════════════════════════════════════╗
     ║  TABLEAU DE BORD — affiché après connexion réussie   ║
     ╚════════════════════════════════════════════════════════╝ -->
<div class="admin-wrap" id="panel-dashboard" style="display:none;"> <!-- Dashboard masqué par défaut, affiché par admin.js après login -->

  <!-- En-tête du dashboard avec titre et boutons de navigation -->
  <div class="admin-header">
    <div style="display:flex;align-items:center;gap:14px;">
      <span class="admin-title">🔧 Administration</span> <!-- Titre du panneau admin -->
      <span class="admin-badge">MODE ADMIN</span> <!-- Badge rouge indiquant le mode administrateur -->
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="/" style="color:var(--text-muted);font-size:.84rem;text-decoration:none;">← Quiz</a> <!-- Lien retour vers le quiz principal -->
      <button class="btn-logout" id="btn-logout">Déconnexion</button> <!-- Bouton de déconnexion admin -->
    </div>
  </div>

  <!-- Onglets de navigation entre les sections du dashboard -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="users">👤 Utilisateurs</button> <!-- Onglet liste des joueurs (actif par défaut) -->
    <button class="tab-btn" data-tab="scores">🏆 Classement / Scores</button> <!-- Onglet gestion des scores -->
  </div>

  <!-- ╔════════════════════════════════════════════════════════╗
       ║  ONGLET : UTILISATEURS                               ║
       ╚════════════════════════════════════════════════════════╝ -->
  <div id="tab-users"> <!-- Contenu de l'onglet utilisateurs (visible par défaut) -->

    <!-- Cartes statistiques résumant les données globales -->
    <div class="admin-stats">
      <div class="admin-stat"> <!-- Carte statistique : nombre de joueurs inscrits -->
        <div class="admin-stat-val" id="stat-nb-users">—</div> <!-- Valeur remplie par admin.js après chargement -->
        <div class="admin-stat-label">Joueurs inscrits</div> <!-- Label de la statistique -->
      </div>
      <div class="admin-stat"> <!-- Carte statistique : nombre total de parties jouées -->
        <div class="admin-stat-val" id="stat-nb-scores">—</div> <!-- Valeur remplie par admin.js -->
        <div class="admin-stat-label">Parties jouées</div> <!-- Label de la statistique -->
      </div>
    </div>

    <!-- En-tête de section avec bouton d'actualisation -->
    <div class="section-head">
      <span class="section-title">Liste des joueurs</span> <!-- Titre de la section -->
      <button class="btn-refresh" id="btn-refresh-users">↻ Actualiser</button> <!-- Bouton pour recharger la liste des joueurs -->
    </div>

    <!-- Tableau des joueurs inscrits -->
    <div class="admin-table-wrap"> <!-- Conteneur avec bordures arrondies pour le tableau -->
      <table class="admin-table"> <!-- Tableau HTML des joueurs -->
        <thead> <!-- En-tête du tableau avec les noms de colonnes -->
          <tr>
            <th>#</th> <!-- Colonne identifiant unique du joueur -->
            <th>Pseudo</th> <!-- Colonne nom d'utilisateur -->
            <th>Inscrit le</th> <!-- Colonne date d'inscription -->
            <th>Action</th> <!-- Colonne bouton de suppression -->
          </tr>
        </thead>
        <tbody id="users-body"> <!-- Corps du tableau rempli dynamiquement par admin.js -->
          <tr class="empty-row"><td colspan="4">Chargement…</td></tr> <!-- Contenu initial affiché pendant le chargement -->
        </tbody>
      </table>
    </div>

  </div> <!-- fin #tab-users -->

  <!-- ╔════════════════════════════════════════════════════════╗
       ║  ONGLET : SCORES / CLASSEMENT                        ║
       ╚════════════════════════════════════════════════════════╝ -->
  <div id="tab-scores" style="display:none;"> <!-- Contenu de l'onglet scores (masqué par défaut) -->

    <!-- En-tête de section avec bouton d'actualisation -->
    <div class="section-head">
      <span class="section-title">Tous les scores (bruts)</span> <!-- Titre : tous les scores sans filtre par joueur -->
      <button class="btn-refresh" id="btn-refresh-scores">↻ Actualiser</button> <!-- Bouton pour recharger la liste des scores -->
    </div>

    <!-- Tableau de tous les scores enregistrés -->
    <div class="admin-table-wrap"> <!-- Conteneur avec bordures arrondies -->
      <table class="admin-table"> <!-- Tableau HTML des scores -->
        <thead> <!-- En-tête du tableau -->
          <tr>
            <th>#ID</th> <!-- Identifiant unique du score en base de données -->
            <th>Pseudo</th> <!-- Pseudo du joueur pour cette partie -->
            <th>Score</th> <!-- Points totaux obtenus -->
            <th>Réponses</th> <!-- Ratio bonnes réponses / total (ex : 7/10) -->
            <th>Durée</th> <!-- Durée de la partie en format MM:SS -->
            <th>Date</th> <!-- Date et heure de la partie -->
            <th>Actions</th> <!-- Boutons Modifier et Supprimer -->
          </tr>
        </thead>
        <tbody id="scores-body"> <!-- Corps du tableau rempli dynamiquement par admin.js -->
          <tr class="empty-row"><td colspan="7">Chargement…</td></tr> <!-- Contenu initial pendant le chargement -->
        </tbody>
      </table>
    </div>

  </div> <!-- fin #tab-scores -->

</div> <!-- fin #panel-dashboard -->

<!-- ╔════════════════════════════════════════════════════════╗
     ║  MODAL : MODIFICATION D'UN SCORE                     ║
     ╚════════════════════════════════════════════════════════╝ -->
<!-- Overlay plein écran semi-transparent affiché lors de la modification d'un score -->
<div id="edit-overlay" class="edit-overlay">
  <div class="edit-box"> <!-- Boîte de formulaire centrée dans l'overlay -->
    <h3 class="edit-title">✏️ Modifier le score</h3> <!-- Titre du modal de modification -->

    <!-- Champ pseudo du joueur -->
    <div class="edit-row">
      <label class="edit-label">Pseudo</label> <!-- Label du champ pseudo -->
      <input type="text" id="edit-pseudo" class="edit-input" maxlength="80" /> <!-- Champ de saisie du pseudo (max 80 caractères) -->
    </div>

    <!-- Champ score en points -->
    <div class="edit-row">
      <label class="edit-label">Score (points)</label> <!-- Label du champ score -->
      <input type="number" id="edit-score" class="edit-input" min="0" /> <!-- Champ numérique pour le score (min 0) -->
    </div>

    <!-- Champ nombre de bonnes réponses -->
    <div class="edit-row">
      <label class="edit-label">Bonnes réponses</label> <!-- Label du champ bonnes réponses -->
      <input type="number" id="edit-bonnes" class="edit-input" min="0" /> <!-- Champ numérique pour les bonnes réponses -->
    </div>

    <!-- Champ nombre total de questions -->
    <div class="edit-row">
      <label class="edit-label">Total questions</label> <!-- Label du champ total questions -->
      <input type="number" id="edit-total" class="edit-input" min="0" /> <!-- Champ numérique pour le total de questions jouées -->
    </div>

    <!-- Champ durée de la partie en secondes -->
    <div class="edit-row">
      <label class="edit-label">Durée (secondes)</label> <!-- Label du champ durée -->
      <input type="number" id="edit-duree" class="edit-input" min="0" /> <!-- Champ numérique pour la durée en secondes -->
    </div>

    <div id="edit-error" class="edit-error"></div> <!-- Zone d'affichage des erreurs de validation du formulaire -->

    <!-- Boutons d'action du modal -->
    <div class="edit-actions">
      <button class="btn-cancel" id="btn-edit-cancel">Annuler</button> <!-- Bouton pour fermer le modal sans sauvegarder -->
      <button class="btn btn-primary" style="flex:1;" id="btn-edit-save">Sauvegarder</button> <!-- Bouton pour envoyer les modifications à l'API -->
    </div>
  </div>
</div> <!-- fin #edit-overlay -->

<script src="/js/admin.js"></script> <!-- Chargement du script JavaScript du panneau admin (en fin de body pour que le DOM soit prêt) -->
</body>
</html>
